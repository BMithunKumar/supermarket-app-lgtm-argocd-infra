apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend-svc
  labels:
    app: supermarket-backend
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: supermarket-backend
    env: {{ .Values.global.envName }}
---
# Internal Networking for Frontend Access
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend-svc
  labels:
    app: supermarket-frontend
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: supermarket-frontend
    env: {{ .Values.global.envName }}