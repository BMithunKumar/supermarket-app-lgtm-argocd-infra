apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-ui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: grafana
    targetRevision: 8.5.0
    helm:
      values: |
        adminPassword: "admin"
        persistence:
          enabled: false

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                uid: prometheus
                url: http://prometheus-backend-server.monitoring.svc.cluster.local:80
                isDefault: true
                editable: true

              - name: Loki
                type: loki
                uid: loki
                url: http://loki-backend.monitoring.svc.cluster.local:3100
                editable: true

              - name: Tempo
                type: tempo
                uid: tempo
                url: http://tempo-backend.monitoring.svc.cluster.local:3100
                editable: true
                jsonData:
                  tracesToLogsV2:
                    datasourceUid: loki
                    spanStartTimeShift: '-1h'
                    spanEndTimeShift: '1h'
                    filterByTraceID: true
                    filterBySpanID: false
                  tracesToMetrics:
                    datasourceUid: prometheus
                  serviceMap:
                    datasourceUid: prometheus
                  nodeGraph:
                    enabled: true

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true