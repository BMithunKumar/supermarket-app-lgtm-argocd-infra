apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.6.0
    helm:
      values: |
        deploymentMode: SingleBinary
        
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
            
        singleBinary:
          replicas: 1
          persistence:
            enabled: false

        # ADD THESE BLOCKS TO FIX THE VALIDATION PANIC:
        # This forcefully zeros out the scalable deployment targets
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true