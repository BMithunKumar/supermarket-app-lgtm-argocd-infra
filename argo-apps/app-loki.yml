apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.6.0
    helm:
      values: |
        deploymentMode: SingleBinary
        
        # Completely zero out the scalable component structures at the root level
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
          
        # Force the single binary target configuration parameters
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h

        singleBinary:
          replicas: 1
          persistence:
            enabled: false

        # Turn off all gateway and internal routing components that look for multiple pods
        gateway:
          enabled: false
        resultsCache:
          enabled: false
        chunksCache:
          enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true