apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: tempo
    targetRevision: 1.10.0
    helm:
      values: |
        tempo:
          repository: grafana/tempo
          tag: 2.5.0
          metricsGenerator:
            enabled: false
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true