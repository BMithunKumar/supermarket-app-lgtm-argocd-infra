apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector-infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://open-telemetry.github.io/opentelemetry-helm-charts'
    chart: opentelemetry-collector
    targetRevision: 0.110.0
    helm:
      parameters:
        - name: image.repository
          value: "otel/opentelemetry-collector-contrib"
        - name: image.tag
          value: "0.110.0"
        - name: mode
          value: "deployment"
      values: |
        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          exporters:
            otlphttp/loki:
              endpoint: "http://loki-backend.monitoring.svc.cluster.local:3100/otlp"
            
            # CRITICAL FIX: Ensure the port targets tempo-backend on 4317 (OTLP ingest)
            otlp/tempo:
              endpoint: "tempo-backend.monitoring.svc.cluster.local:4317"
              tls:
                insecure: true
                
            prometheusremotewrite:
              endpoint: "http://prometheus-backend-server.monitoring.svc.cluster.local:80/api/v1/write"
          service:
            pipelines:
              logs:
                receivers: [otlp]
                exporters: [otlphttp/loki]
              traces:
                receivers: [otlp]
                exporters: [otlp/tempo]
              metrics:
                receivers: [otlp]
                exporters: [prometheusremotewrite]
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true